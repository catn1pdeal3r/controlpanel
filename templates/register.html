<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/Luneslogo.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@3.1.9/dist/full.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body class="bg-gray-900 text-white">
    <div id="flash-messages" class="fixed top-0 left-0 w-full p-4">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
               {% for message in messages %}
               <div class="bg-red-600 text-white rounded-lg p-4 mb-4 shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current text-white h-6 w-6 inline-block mr-2" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    <span>{{ message }}</span>
                </div>
               {% endfor %}
            {% endif %}
        {% endwith %}
    </div>
    
    <div class="min-h-screen flex items-center justify-center">
        <div class="max-w-md w-full bg-gray-800 shadow-lg rounded-lg p-8">
            <h1 class="text-4xl text-center mb-4">Welcome, Let's Get Started</h1>
            <p class="text-center mb-6">Create your new fresh account!</p>
            <form action="{{ url_for('register_user') }}" method="POST"> 
                <div class="mb-4">
                    <label for="username" class="block text-sm mb-2">Username</label>
                    <input type="text" id="username" name="username" placeholder="John Doe" class="w-full px-3 py-2 bg-gray-900 text-white border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500" required />
                </div>
                <div class="mb-4">
                    <label for="email" class="block text-sm mb-2">Email</label>
                    <input type="text" id="email" name="email" placeholder="myemail@gmail.com" class="w-full px-3 py-2 bg-gray-900 text-white border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500" required />
                </div>
                <div class="mb-4">
                    <label for="password" class="block text-sm mb-2">Password</label>
                    <input type="password" id="password" name="password" class="w-full px-3 py-2 bg-gray-900 text-white border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500" required />
                </div>
                <div class="mb-4">
                    <label for="confirm_password" class="block text-sm mb-2">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="w-full px-3 py-2 bg-gray-900 text-white border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500" required />
                </div>
                <div class="mb-4 flex justify-center">
                    <div class="cf-turnstile" data-sitekey="{{ TURNSTILE_PUBLIC_KEY }}"></div>
                </div>
                <div class="mb-4">
                    <button type="submit" class="w-full bg-gray-700 hover:bg-gray-600 text-white font-semibold py-2 px-4 rounded-lg focus:outline-none focus:shadow-outline">Create An Account</button>
                </div>
            </form>
            <div class="flex items-center justify-center mt-2">
                <a href="{{ url_for('user.login_user') }}" class="text-gray-400 hover:text-white">Already Registered? Click here!</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var flashMessages = document.getElementById("flash-messages");
            if (flashMessages) {
                setTimeout(function() {
                    flashMessages.style.display = "none";
                }, 5000);
            }
        });
    </script>
</body>
</html>
